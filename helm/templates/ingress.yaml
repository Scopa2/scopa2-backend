apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  annotations:
    # Performance tweaks
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"

    # WebSocket support (required for Laravel broadcasting / Soketi)
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"

    # WebSocket rewrite rule: Strip /ws prefix for the backend (Soketi expects /app)
    nginx.ingress.kubernetes.io/rewrite-target: /$2

    # Disable SSL redirect for local Minikube development
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /()(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Release.Name }}-service
                port:
                  number: 80
          - path: /ws(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Release.Name }}-soketi-service
                port:
                  number: 6001
