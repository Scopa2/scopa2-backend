apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  annotations:
    # Performance tweaks
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"

    # WebSocket support (required for Laravel broadcasting / Soketi)
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/connection-proxy-header: "keep-alive"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$request_uri"

    # WebSocket upgrade headers
    nginx.ingress.kubernetes.io/proxy-set-headers: "Upgrade"
    nginx.ingress.kubernetes.io/websocket-services: "{{ .Release.Name }}-soketi-service"

    # Disable SSL redirect for local Minikube development
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-service
                port:
                  number: 80
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-soketi-service
                port:
                  number: 6001
